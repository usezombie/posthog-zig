name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Verify VERSION matches git tag ────────────────────────────────────────
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve release version
        id: meta
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+(\.[0-9]+)?$' || { echo "✗ VERSION must be version format x.y or x.y.z, got: $VERSION"; exit 1; }
          [ "$TAG_VERSION" = "$VERSION" ] || { echo "✗ VERSION ($VERSION) does not match tag ($TAG_VERSION)"; exit 1; }
          TAG="v$TAG_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✓ release version resolved: $VERSION ($TAG), tag matches VERSION"

  lint:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: make test-unit

  cross-compile:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - name: Verify no external C deps
        run: |
          result=$(zig build test-bin -Dtarget=${{ matrix.target }} --summary all 2>&1 | grep -c "link with" || true)
          if [ "$result" -eq 0 ]; then
            echo "PASS: pure Zig"
          else
            echo "WARN: C deps detected"
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    needs: cross-compile
    container:
      image: debian:trixie-slim
      options: --security-opt seccomp=unconfined
    steps:
      - name: Install kcov and toolchain deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            kcov git curl xz-utils ca-certificates make gpg
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Run coverage gate
        run: make coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          slug: usezombie/posthog-zig
          files: coverage/cobertura.xml
          flags: posthog-zig
          fail_ci_if_error: true
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── GitHub Release with CHANGELOG excerpt ────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [coverage, verify-version]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.txt
          echo "--- Release notes ---"
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release_notes.txt
          name: "posthog-zig ${{ needs.verify-version.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish zig package (zig fetch verification) ──────────────────────────
  verify-fetchable:
    runs-on: ubuntu-latest
    needs: [create-release, verify-version]
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Create temp fetch workspace
        run: |
          FETCH_DIR="$(mktemp -d /tmp/posthog-fetch-XXXXXX)"
          echo "FETCH_DIR=$FETCH_DIR" >> "$GITHUB_ENV"
      - name: Verify package is fetchable
        working-directory: ${{ env.FETCH_DIR }}
        run: |
          TAG="${{ needs.verify-version.outputs.tag }}"
          cat > build.zig << EOF
          const std = @import("std");

          pub fn build(_: *std.Build) void {}
          EOF
          cat > build.zig.zon << EOF
          .{
              .name = .fetch_test,
              .version = "0.0.1",
              .dependencies = .{
                  .posthog = .{
                      .url = "https://github.com/usezombie/posthog-zig/archive/refs/tags/$TAG.tar.gz",
                  },
              },
              .paths = .{ "build.zig.zon" },
          }
          EOF
          zig fetch --save "https://github.com/usezombie/posthog-zig/archive/refs/tags/$TAG.tar.gz"
          echo "✓ package fetchable via zig fetch"
