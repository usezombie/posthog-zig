name: ci

on:
  push:
  pull_request:

jobs:
  # ── Lint: zig fmt --check ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: make lint

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: make test-unit

  # ── Line coverage (kcov + Codecov) ───────────────────────────────────────
  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install kcov (build from source — not in Ubuntu 24.04 apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev libdw-dev binutils-dev
          git clone --depth 1 --branch v42 https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cmake -S /tmp/kcov -B /tmp/kcov-build -DCMAKE_BUILD_TYPE=Release
          make -C /tmp/kcov-build -j$(nproc)
          sudo make -C /tmp/kcov-build install
      - name: Run coverage gate
        run: make test-coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cobertura.xml
          flags: posthog-zig
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Cross-compile: verify pure-Zig on Linux + macOS targets ──────────────
  cross-compile:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - name: Verify no external C deps
        run: |
          result=$(zig build test-bin -Dtarget=${{ matrix.target }} --summary all 2>&1 | grep -c "link with" || true)
          [ "$result" -eq 0 ] && echo "PASS: pure Zig" || { echo "WARN: C deps detected"; exit 1; }
