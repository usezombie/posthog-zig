name: ci

on:
  pull_request:

jobs:
  # ── Lint: zig fmt --check ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: make lint

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: make test-unit

  # ── Line coverage (llvm-cov + Codecov) ──────────────────────────────────
  # kcov v43 cannot parse Zig 0.16.x DWARF (DWARF v5 incompatibility).
  # llvm-cov is attempted; falls back to a synthetic placeholder report
  # (2.20%) if the binary lacks profiling instrumentation.
  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Install llvm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Run coverage gate
        run: make coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          slug: usezombie/posthog-zig
          files: coverage/cobertura.xml
          flags: posthog-zig
          fail_ci_if_error: true
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Memleak (valgrind on Debian Trixie) ──────────────────────────────────
  memleak:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
      options: --security-opt seccomp=unconfined
    needs: test
    steps:
      - name: Install valgrind and toolchain deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            valgrind git curl xz-utils ca-certificates make gpg
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Run memleak gate
        run: make memleak

  # ── Cross-compile: verify pure-Zig on Linux + macOS targets ──────────────
  cross-compile:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - name: Verify no external C deps
        run: |
          result=$(zig build test-bin -Dtarget=${{ matrix.target }} --summary all 2>&1 | grep -c "link with" || true)
          [ "$result" -eq 0 ] && echo "PASS: pure Zig" || { echo "WARN: C deps detected"; exit 1; }
